<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Save Our Wildlife</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header>
    <h1>Save Our Wildlife</h1>
  </header>

  <main>
    <section class="video-section">
      <video id="video" controls preload="metadata">
        <source src="wildlife.mp4" type="video/mp4" />
        Your browser does not support video.
      </video>

      <div class="controls">
        <button id="toggleBtn" onclick="toggleVideo()">&#9654; Play Video</button>
        <span id="status">Paused</span>
      </div>
    </section>

    <section class="description">
      <p>
        Join our mission to protect endangered species across the globe.
        This video highlights the beauty of wildlife and the urgent need
        for conservation action before it's too late.
      </p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
